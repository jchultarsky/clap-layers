name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Two things break without anyone touching the code: a security advisory is
    # published against an unchanged Cargo.lock, and a new stable rustc changes
    # the diagnostics the UI tests pin. Neither shows up on a push, so check on
    # a timer. Mondays, 07:00 UTC.
    #
    # GitHub disables scheduled workflows after 60 days without repository
    # activity: a long silence here means "unverified", not "clean".
    - cron: "0 7 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.85"] # 1.85 = MSRV
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Test
        # UI tests pin rustc's rendering of macro diagnostics, which shifts
        # between toolchains; assert them on stable only.
        #
        # Emit an explicit true/false. `${{ cond && '' || '1' }}` reads like a
        # ternary but is not: '' is falsy in GitHub expressions, so the && arm
        # collapses and the whole thing yields '1' on *every* job — silently
        # skipping these tests everywhere, which is precisely what they exist to
        # prevent.
        env:
          CLAP_LAYERS_SKIP_UI_TESTS: ${{ matrix.rust != 'stable' }}
        run: cargo test --workspace --all-features

  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --no-deps --workspace --all-features

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate code coverage
        run: cargo llvm-cov --workspace --no-cfg-coverage --lcov --output-path coverage.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          flags: coverage
          fail_ci_if_error: false

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-deny
      # Advisories, licences, duplicates and sources, per deny.toml. The same
      # command you run locally, so a failure here reproduces verbatim.
      #
      # This subsumes cargo-audit: same RustSec database, same coverage of
      # vulnerabilities, unmaintained, unsound, yanked and notice advisories.
      - name: cargo deny check
        run: cargo deny check
